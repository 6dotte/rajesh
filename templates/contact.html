{%extends "base_new.html"%}
{% load static %}
{%block body_block%}

<!--  Hero Banner  Start====== -->
<div class="page-title-wrap pt-img-wrap" style="background:url(/static/images/banner/contact.jpg) ;background-position:center; no-repeat;">
    <div class="container">
        <div class="col-lg-12 col-md-12">
            <div class="pt-caption text-center mt-5">
                <h1>Contact Us</h1>                
            </div>
        </div>
    </div>
</div>
<div class="clearfix"></div>
<!--  Hero Banner End -->

<!-- Who We Are Start -->
<section>
    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-lg-4 col-md-4">
                <div class="contact-box">
                    <i class="ti-map-alt"></i>
                    <h4>Head Offices</h4>
                    810 Clis Road,<br>
                    Indraprash NW11 0PU, India
                </div>
            </div>

            <div class="col-lg-4 col-md-4">
                <div class="contact-box">
                    <i class="ti-email"></i>
                    <h4>Drop a Mail</h4>
                    mkbrothers@gmail.com<br>
                    my.mkbrothers@gmail.com
                </div>
            </div>

            <div class="col-lg-4 col-md-4">
                <div class="contact-box">
                    <i class="ti-headphone"></i>
                    <h4>Call Us</h4>
                    91+ 123 456 9857<br>
                    91+ 258 548 5426
                </div>
            </div>

        </div>

        <div class="row mt-5">

            <div class="col-lg-6 col-md-12 image-bg ct-img">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3502070.807610935!2d73.15741798909497!3d30.998627513926714!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x391964aa569e7355%3A0x8fbd263103a38861!2sPunjab!5e0!3m2!1sen!2sin!4v1642833764205!5m2!1sen!2sin"
                    width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
            <div class="col-lg-6 col-md-12">
                <div class="contact-form">
                    <form method="post" action="">
                        <div class="form-row">
                            {% csrf_token %}
                            <div class="form-group col-md-6">
                                <label>Name</label>
                                <input type="text" class="form-control" name="name" placeholder="Name">
                            </div>
                            <div class="form-group col-md-6">
                                <label>Email</label>
                                <input type="email" class="form-control" name="email" placeholder="Email">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Subject</label>
                            <input type="text" class="form-control" name="subject" placeholder="Subject">
                        </div>
                        <div class="form-group">
                            <label>Message</label>
                            <textarea class="form-control" name="message" placeholder="Type Here..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </form>
                </div>
            </div>

        </div>

    </div>
</section>
<div class="clearfix"></div>
<!-- Who We Are End -->

{% endblock %}
