{%extends "base_new.html"%}
{% load static %}
{%block body_block%}

<!-- Hero Banner  Start -->
<div class="container-fluid breadcrumbs">
    <div class="container">
        <div class="row">
            <div class="col-xs-12">
                <a href="/">
                    Home
                </a>
                <a href="javascript:void(0)">
                    <span>
                        <i class="ti-arrow-right"></i>
                    </span>
                    {{details.title}}
                </a>
            </div>
        </div>
    </div>
</div>
<div class="clearfix"></div>
<!-- Hero Banner End -->

<!-- Services Detail Start  -->
<section class="service-detail-sec">
    <div class="container">


        <!-- All Product List -->
        <div class="row">

            <!-- Sidebar -->
            <div class="col-lg-4 col-md-12 col-sm-12 mb-4 hidden-sm">

                <div class="side-widget gray">
                    <div class="side-widget-header border-0">
                        <h4>Other Services</h4>
                    </div>
                    <ul class="pl-0">
                        {% for service in services %}
                        <li><a href="/service/{{service.slug}}" {% if slug|stringformat:'s' == service.slug|stringformat:'s' %}class="active"{% endif %}>{{service.title}}</a></li>
                        {% endfor %}
                    </ul>
                </div>
            </div>

            <!-- All Product -->
            <div class="col-lg-8 col-md-12 col-sm-12 mb-4">
                <div class="row">

                    <!-- Single Img -->
                    <div class="col-lg-12 col-md-6 col-sm-6 ">
                        <div class=" service-detail product-wrap">
                            <div class="product-caption">
                                <div class="product-caption-info">
                                    <div class="product-caption-thumb">
                                        <div class="product-caption-content">
                                            <h2 class="mb-4 text-center px-2">{{details.title}}</h2>
                                            <img src="{{details.image.url}}" class="img-fluid mx-auto"
                                                alt="">
                                            <div class="description text-left mt-4">
                                                <p>{{details.description | safe }}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- All Product List End -->

    </div>
</section>
<div class="clearfix"></div>
<!-- Services Detail End -->

{% endblock %}
