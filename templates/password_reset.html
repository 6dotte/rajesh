{%extends "base_new.html"%}
{% load static %}
{%block body_block%}

<section class="hero-banner-2 p-0" style="height:660px;background-image: url(/static/illustrations/login.jpg);">
    
    <div class="container">
        <div class="row login pt-4">
            
            <div class="col-md-10 col-sm-12 col-lg-5 form  mx-auto banner-thumb">
			<h2>Password Reset</h2>
			<p>Forgotten your password? Enter your email address below, and we’ll email instructions for setting a new one.</p>
            <form method="post">
				{% csrf_token %}
				<div class="col-md-12 form-group pmb-0">
                    {{form.email}}
                </div>	
				<button class="primary-button w-100" name="Send email" type="submit">Submit</button>
			</form>
            {% for message in messages %}
            <p id="messages">{{message}}</p>
            {% endfor %}
        </div>
	</div>
	</div>
	</section>


<script>
	/* Because i didnt set placeholder values in forms.py they will be set here using vanilla Javascript
//We start indexing at one because CSRF_token is considered and input field 
*/

//Query All input fields
var form_fields = document.getElementsByTagName('input')
form_fields[1].placeholder='Email';


for (var field in form_fields){	
form_fields[field].className += ' form-control'
}
</script>

{%endblock%}
